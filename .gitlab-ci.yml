image: node:20-slim

stages:
  - install
  - build
  - test

variables:
  # Database configuration for integration tests
  POSTGRES_DB: edumanager_test
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_HOST_AUTH_METHOD: trust
  # Backend environmental variables for testing
  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/edumanager_test"
  DATABASE_SYNCHRONIZE: "true"
  JWT_SECRET: "ci-secret-jwt-key-test-12345"
  JWT_REFRESH_SECRET: "ci-secret-refresh-key-test-12345"
  NODE_ENV: "test"
  # Environment variable for Karma to locate the Headless Chromium bin
  CHROME_BIN: "/usr/bin/chromium"

# Cache node_modules using package-lock.json as key
cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
    - node_modules/
    - packages/shared/node_modules/
    - packages/backend/node_modules/
    - packages/frontend/node_modules/

install:
  stage: install
  script:
    - npm ci --cache .npm --prefer-offline --legacy-peer-deps
  artifacts:
    paths:
      - node_modules/
      - packages/shared/node_modules/
      - packages/backend/node_modules/
      - packages/frontend/node_modules/
    expire_in: 1 day

build:
  stage: build
  dependencies:
    - install
  script:
    - npm run build:shared
    - npm run build:backend
    - npm run build:frontend
  artifacts:
    paths:
      - packages/shared/dist/
      - packages/backend/dist/
      - packages/frontend/dist/
    expire_in: 1 day

test:backend:
  stage: test
  services:
    - name: postgres:15-alpine
      alias: postgres
  dependencies:
    - install
    - build
  script:
    - npm run test:backend

test:frontend:
  stage: test
  dependencies:
    - install
    - build
  before_script:
    - apt-get update && apt-get install -y chromium
  script:
    - npm run test:headless --workspace=@edumanager/frontend
